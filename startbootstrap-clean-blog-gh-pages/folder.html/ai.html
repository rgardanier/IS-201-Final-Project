<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Head Soccer</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #222; font-family: Arial, sans-serif; color: white; overflow: hidden; }
        canvas { background: #87CEEB; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { margin-bottom: 10px; font-size: 24px; font-weight: bold; }
        .controls { margin-top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <select id="navDropdown" style="position: absolute; top: 10px; right: 10px; padding: 5px;">
        <option value="">Navigate</option>
        <option value="../index.html">Home</option>
    </select>

    <div class="ui">PLAYER <span id="p1Score">0</span> - <span id="p2Score">0</span> CPU</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">ARROWS to Move & Jump</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game Constants
const GRAVITY = 0.6;
const FRICTION = 0.98;
const GROUND_Y = 350;

// Game State
let score1 = 0;
let score2 = 0;

class Entity {
    constructor(x, y, radius, color, isBall = false) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.color = color;
        this.dx = 0;
        this.dy = 0;
        this.isBall = isBall;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.closePath();
    }

    applyPhysics() {
        this.dy += GRAVITY;
        this.x += this.dx;
        this.y += this.dy;

        // Ground collision
        if (this.y + this.radius > GROUND_Y) {
            this.y = GROUND_Y - this.radius;
            this.dy *= this.isBall ? -0.7 : 0; // Bounce ball, stop player
        }

        // Wall collision
        if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
            this.dx *= -0.8;
            this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
        }

        if (this.isBall) {
            this.dx *= 0.99; // Air resistance
        } else {
            this.dx *= 0.8;  // Player friction
        }
    }
}

const p1 = new Entity(100, 300, 30, '#ff4444');
const cpu = new Entity(700, 300, 30, '#4444ff');
const ball = new Entity(400, 200, 15, '#ffffff', true);

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// Navigation dropdown
document.getElementById('navDropdown').addEventListener('change', function() {
    if (this.value) {
        window.location.href = this.value;
    }
});

function resolveCollision(circle1, circle2) {
    const dx = circle2.x - circle1.x;
    const dy = circle2.y - circle1.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < circle1.radius + circle2.radius) {
        // Simple kick/bounce physics
        const angle = Math.atan2(dy, dx);
        const force = 10;
        
        circle2.dx = Math.cos(angle) * force;
        circle2.dy = Math.sin(angle) * force;
    }
}

function update() {
    // Player 1 Movement
    if (keys['ArrowLeft']) p1.dx -= 1.5;
    if (keys['ArrowRight']) p1.dx += 1.5;
    if (keys['ArrowUp'] && p1.y >= GROUND_Y - p1.radius) p1.dy = -15;

    // Simple CPU AI
    if (ball.x > cpu.x + 20) cpu.dx += 1;
    if (ball.x < cpu.x - 20) cpu.dx -= 1;
    if (ball.y < cpu.y - 50 && ball.x > 500 && cpu.y >= GROUND_Y - cpu.radius) cpu.dy = -15;

    // Apply Physics
    p1.applyPhysics();
    cpu.applyPhysics();
    ball.applyPhysics();

    // Collisions
    resolveCollision(p1, ball);
    resolveCollision(cpu, ball);

    // Goal Scoring
    if (ball.y > 250) { // Only score if ball is low enough
        if (ball.x < 20) {
            score2++;
            resetBall();
        } else if (ball.x > canvas.width - 20) {
            score1++;
            resetBall();
        }
    }

    draw();
    requestAnimationFrame(update);
}

function resetBall() {
    ball.x = 400;
    ball.y = 100;
    ball.dx = 0;
    ball.dy = 0;
    document.getElementById('p1Score').innerText = score1;
    document.getElementById('p2Score').innerText = score2;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Grass
    ctx.fillStyle = '#2e7d32';
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

    // Draw Goals
    ctx.strokeStyle = "white";
    ctx.lineWidth = 5;
    ctx.strokeRect(0, 250, 30, 100); // Left Goal
    ctx.strokeRect(770, 250, 30, 100); // Right Goal

    p1.draw();
    cpu.draw();
    ball.draw();
}

update();
</script>
</body>
</html>
